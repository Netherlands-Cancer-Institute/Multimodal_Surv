seed: 42
device: cuda

paths:
  internal_metadata: data/internal_survival.json
  external_metadata:
    ispy1: data/ispy1_survival.json
    duke: data/duke_survival.json
  image_dirs:
    internal: /path/to/internal/preprocessed_mri
    ispy1: /path/to/ispy1/preprocessed_mri
    duke: /path/to/duke/preprocessed_mri
  radiologic_dir: RadioLOGIC
  checkpoint_dir: checkpoints
  output_dir: outputs

data:
  endpoint: os                 # os: label/time; dfs: label_drm/time_drm
  split_group_key: identifier
  train_fraction: 0.4
  val_fraction: 0.3
  test_fraction: 0.3
  batch_size: 4
  evaluation_batch_size: 4
  num_workers: 8
  max_report_length: 512
  expected_image_shape: [160, 160, 160]
  image_clip_max: 3000.0
  tumor_mask_weight: 10.0

  # Templates are relative to paths.image_dirs.<cohort>.
  # The defaults reproduce the filenames used by the original loaders.
  # For output generated directly by preprocessing/preprocess_mri.py, use:
  #   dce1: "{case_id}/dce1.nii.gz"
  #   dce2: "{case_id}/dce2.nii.gz"
  #   mask: "{case_id}/seg.nii.gz"
  image_filename_templates:
    internal:
      dce1: "{case_id}_1.nii.gz"
      dce2: "{case_id}_2.nii.gz"
      mask: "{case_id}_mask.nii.gz"
    ispy1:
      dce1: "{case_id}_0001_0000.nii.gz"
      dce2: "{case_id}_0001_0001.nii.gz"
      mask: "{case_id}_0001.nii.gz"
    duke:
      dce1: "{case_id}_0001_0000.nii.gz"
      dce2: "{case_id}_0001_0001.nii.gz"
      mask: "{case_id}_0001.nii.gz"

model:
  image_backbone: resnet18
  report_feature_dim: 768
  clinical_feature_dim: 300
  mutation_feature_dim: 30
  therapy_feature_dim: 8
  prompt_embedding_dim: 16
  attention_hidden_dim: 512
  fusion_hidden_dim: 512
  dropout: 0.3
  freeze_report_encoder: true

training:
  epochs: 66
  learning_rate_image: 1.0e-5
  learning_rate_fusion: 1.0e-5
  weight_decay: 1.0e-5
  scheduler_step_size: 5
  scheduler_gamma: 0.1
  early_stopping_patience: 10
  checkpoint_name: "vlinc_{endpoint}_best.pt"

evaluation:
  bootstrap_iterations: 1000
